<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root{--ink:#1f1f1f;--muted:#6a6a6a;--green:#1f8f48;--green-dark:#146635;--danger:#d54c4c}
      *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#111 0%,#1b1b1b 100%);color:var(--ink)}
      .app{min-height:100vh;padding:14px}.header{background:#fff;border-radius:16px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:space-between;gap:12px}
      .title{font-size:20px;font-weight:700;color:#111}.subtitle{font-size:11px;color:var(--muted);margin-top:2px}.count-pill{min-width:36px;height:36px;border-radius:999px;background:#111;color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;padding:0 10px}
      .stack{margin-top:16px;position:relative}.stack-label{color:#f4f4f4;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin:0 0 8px 6px}
      .order-info{background:#fff;border-radius:14px;padding:10px 12px;margin-bottom:10px;box-shadow:0 8px 18px rgba(0,0,0,.2);border:1px solid rgba(0,0,0,.08);display:grid;gap:4px}.order-info-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#666;font-weight:700}.order-info-main{font-size:16px;font-weight:700;color:#111}.order-info-sub{font-size:12px;color:#444}
      .note{position:relative;border-radius:18px;padding:18px;box-shadow:0 18px 35px rgba(0,0,0,.28);border:1px solid rgba(0,0,0,.08);overflow:hidden;background-image:linear-gradient(170deg,#fff2a8 0%,#ffe06f 48%,#ffd25c 100%);background-position:center;background-repeat:no-repeat;background-size:cover}
      .note.current{transform:rotate(-1deg)}.note.next{margin-top:-10px;margin-left:18px;transform:rotate(1.5deg) scale(.97);opacity:.95}.note.slide-out{animation:slideLeft .32s ease forwards}
      @keyframes slideLeft{from{transform:translateX(0) rotate(-1deg);opacity:1}to{transform:translateX(-120%) rotate(-4deg);opacity:0}}
      .note::after{content:"";position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.46),rgba(255,255,255,.18));pointer-events:none}
      .note-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#5f551f;margin-bottom:6px}.name{font-size:26px;line-height:1.05;font-weight:700;margin:0}.meta{font-size:13px;color:#4b4b4b;margin-top:4px}
      .status-pill{padding:7px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.08)}.status-PENDIENTE{background:#fff2cc}.status-EN-PREP{background:#d9ebfa}
      .badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:700;border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.55)}.badge.warn{background:#ffe0a6}.badge.ok{background:#daf0d2}.badge.danger{background:#f8c9c9}
      .sections{margin-top:14px;display:grid;gap:12px}.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;color:#5f551f}.section-body{font-size:15px;line-height:1.38;white-space:pre-wrap;word-break:break-word}
      .footer-grid{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}.footer-box{background:rgba(255,255,255,.45);border-radius:12px;padding:10px;border:1px solid rgba(0,0,0,.06)}.footer-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#6d6d6d;font-weight:700}.footer-value{margin-top:4px;font-size:14px;font-weight:700}
      .actions{margin-top:16px}.btn-ready{width:100%;border:0;border-radius:14px;padding:14px 12px;background:var(--green);color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:transform .12s ease,background .12s ease}.btn-ready:hover{transform:translateY(-1px);background:var(--green-dark)}
      .empty{background:#fff;border-radius:18px;padding:24px 18px;text-align:center;box-shadow:0 18px 35px rgba(0,0,0,.18)}.empty h3{margin:0 0 8px;font-size:22px}.empty p{margin:0;color:#666;line-height:1.4}
      .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}.overlay.show{display:flex}.confirm-card{width:100%;max-width:360px;background:#fff;border-radius:18px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.28)}.confirm-title{font-size:22px;font-weight:700;margin-bottom:6px}.confirm-text{color:#555;line-height:1.4;margin-bottom:14px}.confirm-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn-cancel,.btn-confirm{border:0;border-radius:12px;padding:12px;font-weight:700;cursor:pointer}.btn-cancel{background:#efefef;color:#111}.btn-confirm{background:var(--green);color:#fff}
      .loading{position:fixed;right:14px;top:14px;background:#111;color:#fff;border-radius:999px;padding:8px 12px;font-size:12px;display:none;z-index:25}.loading.show{display:block}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111;color:#fff;padding:10px 14px;border-radius:999px;font-size:12px;box-shadow:0 10px 30px rgba(0,0,0,.28);display:none;z-index:30}.toast.show{display:block}
    </style>
  </head>
  <body>
    <div class="loading" id="loading">Cargando…</div>
    <div class="toast" id="toast"></div>
    <div class="app">
      <div class="header">
        <div><div class="title">Chekeo</div><div class="subtitle">Solo órdenes activas según estado en la hoja</div></div>
        <div class="count-pill" id="countPill">0</div>
      </div>
      <div class="stack" id="stack"></div>
    </div>
    <div class="overlay" id="confirmOverlay">
      <div class="confirm-card">
        <div class="confirm-title">¿Marcar como LISTO?</div>
        <div class="confirm-text" id="confirmText"></div>
        <div class="confirm-actions">
          <button class="btn-cancel" id="cancelConfirmBtn">Cancelar</button>
          <button class="btn-confirm" id="confirmReadyBtn">Confirmar</button>
        </div>
      </div>
    </div>
    <script>
      const AppState = {
        orders: [],
        current: null,
        pendingOrderId: null
      };

      const ChekeoBridge = {
        getOrders() {
          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)
              .getChekeoOrders();
          });
        },
        markReady(orderId) {
          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)
              .markOrderReady(orderId);
          });
        }
      };

      const ViewUtils = {
        sectionHtml(title, body) {
          return `<div><div class="section-title">${this.escapeHtml(title)}</div><div class="section-body">${this.escapeHtml(body || '')}</div></div>`;
        },
        shorten(text, max) {
          const value = String(text || '');
          return value.length > max ? value.slice(0, max - 1) + '…' : value;
        },
        escapeClass(value) {
          return String(value || '').replace(/[^A-Za-z0-9_-]/g, '-');
        },
        escapeHtml(value) {
          return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
      };

      const ChekeoRenderer = {
        render(state) {
          const stack = document.getElementById('stack');
          const countPill = document.getElementById('countPill');
          countPill.textContent = state.orders.length;

          if (!state.orders.length) {
            stack.innerHTML = `<div class="stack-label">Cola</div><div class="empty"><h3>Sin pedidos activos</h3><p>No hay órdenes en estado PENDIENTE o EN PREP.</p></div>`;
            return;
          }

          const current = state.orders[0];
          const next = state.orders[1] || null;
          stack.innerHTML = `
            <div class="stack-label">Pedido actual</div>
            ${this.buildCurrentNote(current)}
            ${next ? `<div class="stack-label" style="margin-top:14px;">Siguiente</div>${this.buildNextNote(next)}` : ''}
          `;
        },
        buildCurrentNote(order) {
          const badges = [];
          if (order.specialCase) badges.push('<span class="badge warn">Caso especial</span>');
          if (order.manualReview) badges.push('<span class="badge danger">Revisar manual</span>');
          if (order.confirmed === 'Si') badges.push('<span class="badge ok">Confirmado</span>');
          if (order.paid === 'Si') badges.push('<span class="badge ok">Pagado</span>');

          const sections = [];
          if (order.specialCase) {
            sections.push(ViewUtils.sectionHtml('Orden exacta', order.exactOrderText || 'Sin texto exacto'));
          } else {
            sections.push(ViewUtils.sectionHtml('Burgers', order.burgerSummary || 'Sin detalle'));
            if (order.extras) sections.push(ViewUtils.sectionHtml('Extras / Detalles', order.extras));
          }
          if (order.sides) sections.push(ViewUtils.sectionHtml('Guarnición', order.sides));

          return `
            <div class="order-info">
              <div class="order-info-title">Info de la orden</div>
              <div class="order-info-main">${ViewUtils.escapeHtml(order.id || 'Sin folio')}</div>
              <div class="order-info-sub">Estado actual: ${ViewUtils.escapeHtml(order.kitchenStatus || '')}</div>
            </div>
            <div class="note current" id="currentNote">
              <div class="note-top">
                <div>
                  <div class="eyebrow">En cola</div>
                  <h2 class="name">${ViewUtils.escapeHtml(order.name || 'Sin nombre')}</h2>
                  <div class="meta">${ViewUtils.escapeHtml(order.phone || '')}</div>
                </div>
                <div class="status-pill status-${ViewUtils.escapeClass(order.kitchenStatus)}">${ViewUtils.escapeHtml(order.kitchenStatus)}</div>
              </div>
              ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
              <div class="sections">${sections.join('')}</div>
              <div class="footer-grid">
                <div class="footer-box"><div class="footer-label">Total</div><div class="footer-value">${ViewUtils.escapeHtml(order.totalDisplay || '')}</div></div>
                <div class="footer-box"><div class="footer-label">Pago</div><div class="footer-value">${ViewUtils.escapeHtml(order.payment || '')}</div></div>
              </div>
              <div class="actions">
                <button class="btn-ready" data-action="open-confirm" data-order-id="${ViewUtils.escapeHtml(order.id || '')}">LISTO</button>
              </div>
            </div>
          `;
        },
        buildNextNote(order) {
          const body = order.specialCase ? (order.exactOrderText || 'Caso especial') : (order.burgerSummary || 'Sin detalle');
          return `
            <div class="note next">
              <div class="eyebrow">Siguiente en cola</div>
              <h3 style="margin:0 0 6px;font-size:20px;line-height:1.05;">${ViewUtils.escapeHtml(order.name || 'Sin nombre')}</h3>
              <div class="meta">${ViewUtils.escapeHtml(order.phone || '')}</div>
              <div class="sections" style="margin-top:12px;">
                ${ViewUtils.sectionHtml('Preview', ViewUtils.shorten(body, 180))}
                ${order.sides ? ViewUtils.sectionHtml('Guarnición', ViewUtils.shorten(order.sides, 120)) : ''}
              </div>
            </div>
          `;
        }
      };

      const ChekeoActions = {
        init() {
          document.getElementById('stack').addEventListener('click', (event) => {
            const button = event.target.closest('[data-action="open-confirm"]');
            if (!button) return;
            this.openConfirm(button.dataset.orderId);
          });

          document.getElementById('cancelConfirmBtn').addEventListener('click', () => this.closeConfirm());
          document.getElementById('confirmReadyBtn').addEventListener('click', () => this.confirmReady());
          document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') this.closeConfirm();
          });

          this.loadOrders();
        },
        async loadOrders() {
          this.showLoading(true);
          try {
            const result = await ChekeoBridge.getOrders();
            AppState.orders = (result && result.orders) || [];
            AppState.current = AppState.orders[0] || null;
            AppState.pendingOrderId = null;
            this.closeConfirm(false);
            ChekeoRenderer.render(AppState);
          } catch (err) {
            this.showToast(err && err.message ? err.message : 'Error al cargar pedidos');
          } finally {
            this.showLoading(false);
          }
        },
        openConfirm(orderId) {
          const cleanOrderId = String(orderId || '').trim();
          if (!cleanOrderId) {
            this.showToast('No se encontró el ID del pedido');
            return;
          }
          AppState.pendingOrderId = cleanOrderId;
          const selectedOrder = AppState.orders.find((order) => order.id === cleanOrderId) || AppState.current;
          const customerName = selectedOrder && selectedOrder.name ? selectedOrder.name : 'este cliente';
          document.getElementById('confirmText').textContent = `Se marcará como LISTO el pedido de ${customerName}.`;
          document.getElementById('confirmOverlay').classList.add('show');
        },
        closeConfirm(resetPending = true) {
          document.getElementById('confirmOverlay').classList.remove('show');
          if (resetPending) AppState.pendingOrderId = null;
        },
        async confirmReady(orderIdOverride) {
          const orderId = String(orderIdOverride || AppState.pendingOrderId || (AppState.current && AppState.current.id) || '').trim();
          if (!orderId) {
            this.showToast('No se encontró el ID del pedido');
            this.closeConfirm();
            return;
          }

          const note = document.getElementById('currentNote');
          if (note) note.classList.add('slide-out');

          window.setTimeout(async () => {
            this.showLoading(true);
            try {
              await ChekeoBridge.markReady(orderId);
              this.closeConfirm();
              this.showToast('Pedido marcado como LISTO');
            } catch (err) {
              this.closeConfirm();
              this.showToast(err && err.message ? err.message : 'Error al actualizar');
            } finally {
              this.showLoading(false);
              this.loadOrders();
            }
          }, 260);
        },
        showLoading(show) {
          document.getElementById('loading').classList.toggle('show', !!show);
        },
        showToast(message) {
          const toast = document.getElementById('toast');
          toast.textContent = message || '';
          toast.classList.add('show');
          clearTimeout(window.__toastTimer);
          window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
        }
      };

      document.addEventListener('DOMContentLoaded', () => ChekeoActions.init());
    </script>
  </body>
</html>
