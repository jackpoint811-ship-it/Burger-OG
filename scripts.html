<script>
  var APP_STATE = {
    loading: {},
    activeTab: 'Inicio',
    health: null,
    summary: null,
    orders: [],
    bankConfigOk: false
  };

  var ORDER_STATUS_OPTIONS = ['Nuevo', 'Confirmado', 'Preparando', 'Listo'];
  var PAYMENT_STATUS_OPTIONS = ['Pendiente', 'Pagado'];
  var PAYMENT_METHOD_OPTIONS = ['Efectivo', 'Transferencia', 'Mixto', 'No definido'];

  function initApp() {
    bindEvents();
    setActiveTab('Inicio');
    loadHealth();
    loadSummary();
    loadOrders();
    loadBankConfig();
  }

  function setActiveTab(tabName) {
    APP_STATE.activeTab = tabName;
    Array.prototype.slice.call(document.querySelectorAll('.tab-btn')).forEach(function (btn) {
      btn.classList.toggle('is-active', btn.getAttribute('data-tab') === tabName);
    });

    Array.prototype.slice.call(document.querySelectorAll('.tab-panel')).forEach(function (panel) {
      panel.classList.toggle('is-hidden', panel.id !== 'tab-' + tabName);
    });
  }

  function loadHealth() {
    setLoading('health', true);
    google.script.run
      .withSuccessHandler(function (response) {
        setLoading('health', false);
        if (!response || !response.ok) {
          return renderError(response && response.error ? response.error : { message: 'healthCheck falló.' });
        }
        APP_STATE.health = response.data || {};
        document.getElementById('healthStatus').textContent =
          'Backend OK · Fase ' + APP_STATE.health.phase + ' · Hoja: ' + (APP_STATE.health.activeSheet || 'N/D');
        document.getElementById('backendState').textContent = 'Operativo';
      })
      .withFailureHandler(function (error) {
        setLoading('health', false);
        renderError(error);
      })
      .healthCheck();
  }

  function loadSummary() {
    setLoading('summary', true);
    google.script.run
      .withSuccessHandler(function (response) {
        setLoading('summary', false);
        if (!response || !response.ok) {
          return renderError(response && response.error ? response.error : { message: 'getDailySummary falló.' });
        }
        APP_STATE.summary = response.data || {};
        renderSummary(APP_STATE.summary);
      })
      .withFailureHandler(function (error) {
        setLoading('summary', false);
        renderError(error);
      })
      .getDailySummary();
  }

  function loadOrders() {
    setLoading('orders', true);
    google.script.run
      .withSuccessHandler(function (response) {
        setLoading('orders', false);
        if (!response || !response.ok) {
          return renderError(response && response.error ? response.error : { message: 'getAppOrders falló.' });
        }
        APP_STATE.orders = (response.data || []).slice().sort(function (a, b) {
          return String(a['ID Pedido'] || '').localeCompare(String(b['ID Pedido'] || ''));
        });
        renderOrders(APP_STATE.orders);
        renderKitchen(APP_STATE.orders);
      })
      .withFailureHandler(function (error) {
        setLoading('orders', false);
        renderError(error);
      })
      .getAppOrders();
  }

  function syncOrders() {
    if (APP_STATE.loading.sync) {
      return;
    }

    setLoading('sync', true);
    showToast('Sincronizando pedidos...', 'info');

    google.script.run
      .withSuccessHandler(function (response) {
        setLoading('sync', false);
        if (!response || !response.ok) {
          return renderError(response && response.error ? response.error : { message: 'syncOrdersFromMaster falló.' });
        }

        showToast('Sincronización completada.', 'success');
        reloadOperationalData();
      })
      .withFailureHandler(function (error) {
        setLoading('sync', false);
        renderError(error);
      })
      .syncOrdersFromMaster();
  }

  function loadBankConfig() {
    setLoading('bank', true);
    google.script.run
      .withSuccessHandler(function (response) {
        setLoading('bank', false);
        if (!response || !response.ok) {
          APP_STATE.bankConfigOk = false;
          document.getElementById('bankState').textContent = 'Incompleta';
          return;
        }

        var data = response.data || {};
        APP_STATE.bankConfigOk = Boolean(data.Banco && data.Nombre && data['Número de cuenta']);
        document.getElementById('bankState').textContent = APP_STATE.bankConfigOk ? 'Completa' : 'Incompleta';
      })
      .withFailureHandler(function () {
        setLoading('bank', false);
        APP_STATE.bankConfigOk = false;
        document.getElementById('bankState').textContent = 'Incompleta';
      })
      .getBankConfig();
  }

  function updateOrderStatus(orderId, nextStatus) {
    showToast('Actualizando estado de pedido...', 'info');
    google.script.run
      .withSuccessHandler(handleWriteSuccess_)
      .withFailureHandler(renderError)
      .updateOrderStatus(orderId, nextStatus);
  }

  function updateOrderPayment(orderId, paymentStatus, paymentMethod) {
    showToast('Actualizando pago...', 'info');
    google.script.run
      .withSuccessHandler(handleWriteSuccess_)
      .withFailureHandler(renderError)
      .updateOrderPayment(orderId, paymentStatus, paymentMethod);
  }

  function markOrderPaid(orderId) {
    showToast('Marcando pedido como pagado...', 'info');
    google.script.run
      .withSuccessHandler(handleWriteSuccess_)
      .withFailureHandler(renderError)
      .markOrderPaid(orderId);
  }

  function updateOrderNotes(orderId, noteInternal, noteClient) {
    showToast('Guardando notas...', 'info');
    google.script.run
      .withSuccessHandler(handleWriteSuccess_)
      .withFailureHandler(renderError)
      .updateOrderNotes(orderId, noteInternal, noteClient);
  }

  function updateOrderOperationalData(orderId, payload) {
    showToast('Guardando pedido...', 'info');
    google.script.run
      .withSuccessHandler(handleWriteSuccess_)
      .withFailureHandler(renderError)
      .updateOrderOperationalData(orderId, payload);
  }

  function handleWriteSuccess_(response) {
    if (!response || !response.ok) {
      return renderError(response && response.error ? response.error : { message: 'Operación falló.' });
    }
    showToast(response.message || 'Operación completada.', 'success');
    reloadOperationalData();
  }

  function reloadOperationalData() {
    loadOrders();
    loadSummary();
  }

  function setLoading(key, value) {
    APP_STATE.loading[key] = value;
    if (key === 'sync') {
      document.getElementById('syncButton').disabled = Boolean(value);
    }
  }

  function showToast(message, type) {
    var toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast' + (type ? ' ' + type : '');
  }

  function renderOrders(orders) {
    var container = document.getElementById('ordersContainer');
    if (!orders || !orders.length) {
      container.textContent = 'Sin pedidos para mostrar.';
      return;
    }

    var items = orders.map(function (order) {
      var orderId = String(order['ID Pedido'] || '');
      var safeAlert = escapeHtml(order['Alerta'] || '');
      var alertTag = safeAlert ? '<span class="badge-alert">' + safeAlert + '</span>' : '';

      return '' +
        '<li class="orders-item" data-order-id="' + escapeHtml(orderId) + '">' +
          '<p><strong>' + escapeHtml(orderId || '-') + '</strong>' + alertTag +
            '<span class="pill">' + escapeHtml(order['Estado Pedido'] || '-') + '</span>' +
          '</p>' +
          '<p><strong>Nombre:</strong> ' + escapeHtml(order['Nombre'] || '-') + '</p>' +
          '<p><strong>Resumen:</strong> ' + escapeHtml(order['Resumen Pedido'] || '-') + '</p>' +
          '<p><strong>Total:</strong> ' + escapeHtml(formatMoney(order['Total'])) + '</p>' +
          '<div class="status-row">' +
            '<div class="field">' +
              '<label>Estado Pedido</label>' +
              '<select data-role="order-status">' + buildOptions_(ORDER_STATUS_OPTIONS, order['Estado Pedido']) + '</select>' +
            '</div>' +
            '<div class="field">' +
              '<label>Estado Pago</label>' +
              '<select data-role="payment-status">' + buildOptions_(PAYMENT_STATUS_OPTIONS, order['Estado Pago']) + '</select>' +
            '</div>' +
          '</div>' +
          '<div class="field" style="margin-top:6px;">' +
            '<label>Método Pago</label>' +
            '<select data-role="payment-method">' + buildOptions_(PAYMENT_METHOD_OPTIONS, order['Método Pago']) + '</select>' +
          '</div>' +
          '<div class="field" style="margin-top:6px;">' +
            '<label>Nota Interna</label>' +
            '<textarea data-role="note-internal" placeholder="Operación interna">' + escapeHtml(order['Nota Interna'] || '') + '</textarea>' +
          '</div>' +
          '<div class="field" style="margin-top:6px;">' +
            '<label>Nota Cliente</label>' +
            '<textarea data-role="note-client" placeholder="Nota visible para cliente">' + escapeHtml(order['Nota Cliente'] || '') + '</textarea>' +
          '</div>' +
          '<div class="action-row">' +
            '<button type="button" class="btn btn-secondary" data-action="save-order">Guardar pedido</button>' +
            '<button type="button" class="btn btn-primary" data-action="mark-paid">Marcar pagado</button>' +
          '</div>' +
        '</li>';
    }).join('');

    container.innerHTML = '<ul class="orders-list">' + items + '</ul>';
  }

  function renderKitchen(orders) {
    var container = document.getElementById('kitchenContainer');
    var kitchenOrders = (orders || []).filter(function (order) {
      return String(order['Estado Pedido'] || '') !== 'Listo';
    });

    if (!kitchenOrders.length) {
      container.textContent = 'Sin pedidos activos en cocina.';
      return;
    }

    var items = kitchenOrders.map(function (order) {
      var orderId = String(order['ID Pedido'] || '');
      return '' +
        '<li class="kitchen-item" data-order-id="' + escapeHtml(orderId) + '">' +
          '<p><strong>' + escapeHtml(orderId || '-') + '</strong>' +
            '<span class="pill">' + escapeHtml(order['Estado Pedido'] || '-') + '</span>' +
          '</p>' +
          '<p><strong>Nombre:</strong> ' + escapeHtml(order['Nombre'] || '-') + '</p>' +
          '<p><strong>Hamburguesas:</strong> ' + escapeHtml(order['Hamburguesas'] || '-') + '</p>' +
          '<p><strong>Extras:</strong> ' + escapeHtml(order['Extras'] || '-') + '</p>' +
          '<p><strong>Guarniciones:</strong> ' + escapeHtml(order['Guarniciones'] || '-') + '</p>' +
          '<p><strong>Inicio:</strong> ' + escapeHtml(order['Hora Inicio'] || '-') + ' · <strong>Listo:</strong> ' + escapeHtml(order['Hora Listo'] || '-') + '</p>' +
          '<div class="kitchen-actions">' +
            '<button type="button" class="btn btn-secondary" data-action="k-confirm">Confirmar</button>' +
            '<button type="button" class="btn btn-primary" data-action="k-prep">Preparando</button>' +
            '<button type="button" class="btn btn-danger" data-action="k-ready">Listo</button>' +
          '</div>' +
        '</li>';
    }).join('');

    container.innerHTML = '<ul class="kitchen-list">' + items + '</ul>';
  }

  function renderSummary(summary) {
    var cards = document.getElementById('summaryCards');
    cards.innerHTML = [
      summaryCard('Total vendido', formatMoney(summary.totalVendido)),
      summaryCard('Total pagado', formatMoney(summary.totalPagado)),
      summaryCard('Total pendiente', formatMoney(summary.totalPendiente))
    ].join('');

    renderCountList('orderStatusCount', summary.conteoEstadoPedido || {});
    renderCountList('paymentStatusCount', summary.conteoEstadoPago || {});
  }

  function renderError(error) {
    var message = (error && error.message) ? error.message : 'Error no controlado.';
    showToast(message, 'error');
    if (APP_STATE.activeTab === 'Ajustes') {
      document.getElementById('backendState').textContent = 'Con error';
    }
  }

  function summaryCard(label, value) {
    return '<div class="summary-card"><p class="label">' + escapeHtml(label) + '</p><p class="value">' + escapeHtml(value) + '</p></div>';
  }

  function renderCountList(targetId, counts) {
    var list = document.getElementById(targetId);
    var keys = Object.keys(counts);
    if (!keys.length) {
      list.innerHTML = '<li>Sin datos</li>';
      return;
    }

    list.innerHTML = keys.map(function (key) {
      var safeKey = escapeHtml(key);
      var safeValue = escapeHtml(counts[key]);
      return '<li>' + safeKey + ': ' + safeValue + '</li>';
    }).join('');
  }

  function formatMoney(value) {
    var amount = Number(value);
    if (!isFinite(amount)) {
      return '$0.00';
    }
    return '$' + amount.toFixed(2);
  }

  function buildOptions_(options, selectedValue) {
    var selected = String(selectedValue || '');
    return options.map(function (option) {
      var isSelected = option === selected ? ' selected' : '';
      return '<option value="' + escapeHtml(option) + '"' + isSelected + '>' + escapeHtml(option) + '</option>';
    }).join('');
  }

  function escapeHtml(value) {
    var text = String(value === null || value === undefined ? '' : value);
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function bindEvents() {
    document.getElementById('syncButton').addEventListener('click', syncOrders);

    Array.prototype.slice.call(document.querySelectorAll('.tab-btn')).forEach(function (btn) {
      btn.addEventListener('click', function () {
        setActiveTab(btn.getAttribute('data-tab'));
      });
    });

    document.getElementById('ordersContainer').addEventListener('click', function (event) {
      var button = event.target.closest('button[data-action]');
      if (!button) {
        return;
      }

      var card = button.closest('[data-order-id]');
      if (!card) {
        return;
      }

      var orderId = card.getAttribute('data-order-id');
      var action = button.getAttribute('data-action');

      if (action === 'save-order') {
        var orderStatus = card.querySelector('[data-role="order-status"]').value;
        var paymentStatus = card.querySelector('[data-role="payment-status"]').value;
        var paymentMethod = card.querySelector('[data-role="payment-method"]').value;
        var noteInternal = card.querySelector('[data-role="note-internal"]').value;
        var noteClient = card.querySelector('[data-role="note-client"]').value;

        updateOrderOperationalData(orderId, {
          status: orderStatus,
          paymentStatus: paymentStatus,
          paymentMethod: paymentMethod,
          noteInternal: noteInternal,
          noteClient: noteClient
        });
      }

      if (action === 'mark-paid') {
        markOrderPaid(orderId);
      }
    });

    document.getElementById('kitchenContainer').addEventListener('click', function (event) {
      var button = event.target.closest('button[data-action]');
      if (!button) {
        return;
      }

      var card = button.closest('[data-order-id]');
      if (!card) {
        return;
      }

      var orderId = card.getAttribute('data-order-id');
      var action = button.getAttribute('data-action');

      if (action === 'k-confirm') {
        updateOrderStatus(orderId, 'Confirmado');
      }
      if (action === 'k-prep') {
        updateOrderStatus(orderId, 'Preparando');
      }
      if (action === 'k-ready') {
        updateOrderStatus(orderId, 'Listo');
      }
    });
  }

  document.addEventListener('DOMContentLoaded', initApp);
</script>
