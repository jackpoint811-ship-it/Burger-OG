<style>
  :root {
    --bg: #f6f7fb;
    --card: #fff;
    --text: #1c1c1c;
    --muted: #666;
    --border: #e6e8ef;
    --primary: #0d6efd;
    --danger: #c62828;
    --ok: #2e7d32;
    --overlay: rgba(28, 28, 28, 0.4);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  .app-shell {
    width: min(100%, 1080px);
    max-width: 1080px;
    max-height: 1920px;
    height: min(100vh, 1920px);
    margin: 0 auto;
    overflow-y: auto;
    min-height: 100vh;
    padding: 12px 12px 88px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }

  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .eyebrow {
    margin: 0 0 4px;
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  h1, h2, h3, p { margin: 0; }
  h1 { font-size: 18px; }
  h2 { margin-bottom: 10px; font-size: 18px; }

  .btn {
    min-height: 40px;
    border-radius: 10px;
    border: 1px solid transparent;
    padding: 8px 12px;
    font-weight: 700;
    cursor: pointer;
    background: #fff;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }

  .btn-secondary {
    border-color: var(--border);
    color: var(--text);
  }

  .btn-danger {
    background: var(--danger);
    color: #fff;
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: default;
  }

  .btn.is-loading {
    opacity: 0.7;
    cursor: wait;
  }

  .toast {
    min-height: 20px;
    font-size: 13px;
    margin-bottom: 8px;
    color: var(--muted);
  }

  .toast.success { color: var(--ok); }
  .toast.error { color: var(--danger); }

  .muted { color: var(--muted); margin-top: 8px; }
  .is-hidden { display: none !important; }

  .quick-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }

  .quick-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    background: #fff;
  }

  .quick-item .label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .quick-item .value {
    font-size: 18px;
    font-weight: 700;
  }

  .chips {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 8px;
  }

  .chip {
    flex: 0 0 auto;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
    border-radius: 999px;
    min-height: 34px;
    padding: 0 12px;
    font-size: 12px;
    font-weight: 700;
  }

  .chip.is-active {
    color: var(--primary);
    border-color: var(--primary);
    background: #eef5ff;
  }

  .orders-list,
  .kitchen-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 10px;
  }

  .orders-item,
  .kitchen-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    background: #fff;
  }

  .orders-item p,
  .kitchen-item p { margin: 4px 0; }

  .orders-item-header {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 6px;
  }

  .orders-item-name {
    font-weight: 700;
  }

  .orders-item-summary {
    color: var(--muted);
    font-size: 13px;
  }

  .orders-item-meta {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2px;
    margin-top: 8px;
    font-size: 13px;
  }

  .badge-alert {
    display: inline-block;
    margin-left: 6px;
    color: #ad6800;
    font-weight: 700;
  }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
    border: 1px solid var(--border);
    margin-left: 6px;
  }

  .order-actions-inline {
    margin-top: 10px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }

  .empty-state {
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--muted);
    font-size: 14px;
  }

  .kitchen-actions,
  .modal-actions,
  .action-row {
    display: grid;
    gap: 6px;
    margin-top: 8px;
  }

  .kitchen-actions { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }

  .kitchen-controls { display: grid; gap: 8px; margin-bottom: 10px; }
  .kitchen-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .kitchen-chips .chip { border: 1px solid #ddd; background: #fff; border-radius: 999px; padding: 6px 10px; font-size: 12px; }
  .kitchen-chips .chip.is-active { background: #111; color: #fff; border-color: #111; }
  .kitchen-ticket {
    border: 1px dashed #c7c7c7;
    background: #fffdf7;
    padding: 12px;
    border-radius: 8px;
    font-family: "Courier New", monospace;
  }
  .kitchen-ticket p { margin: 0 0 8px; }
  .chip-side-ready {
    background: #14a44d;
    color: #fff;
    border-radius: 999px;
    font-size: 11px;
    padding: 2px 8px;
    margin-left: 8px;
  }
  .kitchen-next-preview,
  .kitchen-next-preview-empty {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #ececec;
    border-radius: 8px;
    background: #fafafa;
    font-size: 12px;
  }
  .action-row,
  .modal-actions { grid-template-columns: repeat(2, 1fr); }

  .field {
    display: grid;
    gap: 4px;
    margin-top: 8px;
  }

  .field label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
  }

  select,
  textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    padding: 8px;
    font-family: inherit;
    background: #fff;
  }

  textarea {
    min-height: 56px;
    resize: vertical;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .summary-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    background: #fff;
  }

  .summary-card .label {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 4px;
  }

  .summary-card .value {
    font-weight: 700;
    font-size: 18px;
  }

  .summary-lists {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .summary-lists ul {
    margin: 0;
    padding-left: 18px;
  }

  .settings-list {
    margin: 0;
    padding-left: 18px;
    display: grid;
    gap: 8px;
  }

  .bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    margin: 0 auto;
    width: min(100%, 1080px);
    max-width: 1080px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    padding: 8px;
    border-top: 1px solid var(--border);
    background: #fff;
  }

  .tab-btn {
    min-height: 44px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    padding: 0 4px;
  }

  .tab-btn.is-active {
    border-color: var(--primary);
    color: var(--primary);
  }

  .modal {
    position: fixed;
    inset: 0;
    z-index: 30;
  }

  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: var(--overlay);
  }

  .modal-panel {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    width: min(100%, 1080px);
    max-width: 1080px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px 16px 0 0;
    border: 1px solid var(--border);
    max-height: 88vh;
    overflow: auto;
    padding: 12px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .modal-content p {
    margin: 4px 0;
  }

  .ticket-block {
    border-top: 1px solid var(--border);
    margin-top: 10px;
    padding-top: 10px;
  }

  .history-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 8px;
  }

  .history-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    background: #fff;
  }
</style>

<style>
  .action-row-single-mobile {
    margin-bottom: 8px;
  }

  .summary-divider {
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }

  .compact-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 8px;
  }

  .compact-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    background: #fff;
    font-size: 13px;
  }

  .warning-card {
    border: 1px solid #f5d19a;
    background: #fff8ef;
  }

  .check-pill {
    display: inline-block;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    margin-left: 6px;
    border: 1px solid var(--border);
  }

  .check-pill.is-ok {
    color: #2e7d32;
    border-color: #b9dfbd;
    background: #edf9ee;
  }

  .check-pill.is-warning {
    color: #8d5a00;
    border-color: #f3d29a;
    background: #fff7ea;
  }

  .check-pill.is-error {
    color: #b3261e;
    border-color: #f2b8b5;
    background: #fdecec;
  }

  .modal-panel-small {
    bottom: 20%;
    border-radius: 14px;
    max-width: 360px;
  }
</style>
