<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burgers OG</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --primary:#f97316;
      --primary-hover:#ea580c;
      --secondary:#1d4ed8;
      --secondary-hover:#1e40af;
      --danger:#fecaca;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, sans-serif;
      background:linear-gradient(160deg,#020617,#0f172a 45%,#1e293b);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .menu{
      width:100%;
      max-width:420px;
      background:rgba(17,24,39,.95);
      border:1px solid rgba(148,163,184,.25);
      border-radius:16px;
      padding:24px 16px;
      display:flex;
      flex-direction:column;
      gap:14px;
      text-align:center;
      box-shadow:0 18px 42px rgba(2,6,23,.45);
    }

    h1{
      margin:0;
      font-size:1.8rem;
      letter-spacing:.06em;
    }

    p{
      margin:0 0 6px;
      color:var(--muted);
      font-size:1rem;
    }

    .module-btn{
      width:100%;
      border:0;
      border-radius:12px;
      padding:18px 14px;
      color:#fff;
      font-size:1.15rem;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, filter .12s ease, opacity .12s ease;
    }

    .module-btn:active{transform:scale(.98);}
    .module-btn:hover{filter:brightness(1.08);}
    .module-btn:disabled{opacity:.65;cursor:not-allowed;filter:none;}

    .btn-cocina{background:var(--primary);}
    .btn-cocina:hover{background:var(--primary-hover);}

    .btn-tickets{background:var(--secondary);}
    .btn-tickets:hover{background:var(--secondary-hover);}

    .status{
      min-height:18px;
      font-size:.85rem;
      color:var(--muted);
      line-height:1.35;
    }

    .status.error{color:var(--danger);font-weight:700;}
  </style>
</head>
<body>
  <main class="menu" role="main">
    <h1>BURGERS OG</h1>
    <p>Selecciona un módulo</p>

    <button class="module-btn btn-cocina" type="button" data-module="cocina">Cocina</button>
    <button class="module-btn btn-tickets" type="button" data-module="tickets">Tickets Cliente</button>
    <div class="status" id="statusText" aria-live="polite"></div>
  </main>

  <script>
    const APP_MODE='<?= appMode ?>';

    function setBusy(isBusy,message){
      document.querySelectorAll('.module-btn').forEach(function(button){
        button.disabled=isBusy;
      });
      const status=document.getElementById('statusText');
      status.classList.remove('error');
      status.textContent=message||'';
    }

    function showError(error){
      document.querySelectorAll('.module-btn').forEach(function(button){
        button.disabled=false;
      });
      const status=document.getElementById('statusText');
      status.classList.add('error');
      status.textContent=(error&&error.message)?error.message:'No se pudo abrir el módulo.';
    }

    function closeDialogIfPossible(){
      if(typeof google!=='undefined' && google.script && google.script.host && google.script.host.close){
        google.script.host.close();
      }
    }

    function openModule(moduleName){
      if(APP_MODE==='dialog'){
        if(!(typeof google!=='undefined' && google.script && google.script.run)){
          showError(new Error('No se detectó el contexto de diálogo de Google Sheets.'));
          return;
        }
        setBusy(true,moduleName==='cocina'?'Abriendo Cocina…':'Abriendo Tickets Cliente…');
        const runner=google.script.run
          .withSuccessHandler(function(){
            closeDialogIfPossible();
          })
          .withFailureHandler(function(error){
            showError(error);
          });

        if(moduleName==='cocina'){
          runner.showChekeoApp();
        }else{
          runner.showClientTicketsApp();
        }
        return;
      }

      window.location.search=moduleName==='cocina'?'?app=cocina':'?app=ticket';
    }

    document.addEventListener('click',function(event){
      const button=event.target.closest('[data-module]');
      if(!button)return;
      openModule(button.dataset.module);
    });
  </script>
</body>
</html>
